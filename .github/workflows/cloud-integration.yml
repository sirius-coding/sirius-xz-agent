name: cloud-integration

on:
  workflow_dispatch:

jobs:
  cloud-api-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Configure SSH key
        env:
          SIRIUS_CLOUD_SSH_PRIVATE_KEY: ${{ secrets.SIRIUS_CLOUD_SSH_PRIVATE_KEY }}
        run: |
          test -n "${SIRIUS_CLOUD_SSH_PRIVATE_KEY}"
          install -m 700 -d ~/.ssh
          printf "%s\n" "${SIRIUS_CLOUD_SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519_sirius_cloud
          chmod 600 ~/.ssh/id_ed25519_sirius_cloud

      - name: Configure SSH known hosts
        env:
          SIRIUS_CLOUD_SSH_KNOWN_HOSTS: ${{ secrets.SIRIUS_CLOUD_SSH_KNOWN_HOSTS }}
        run: |
          test -n "${SIRIUS_CLOUD_SSH_KNOWN_HOSTS}"
          printf "%s\n" "${SIRIUS_CLOUD_SSH_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Configure SSH target alias
        env:
          SIRIUS_CLOUD_SSH_TARGET: ${{ secrets.SIRIUS_CLOUD_SSH_TARGET }}
        run: |
          test -n "${SIRIUS_CLOUD_SSH_TARGET}"
          cat > ~/.ssh/config <<EOF
          Host sirius-cloud-root
            HostName ${SIRIUS_CLOUD_SSH_TARGET}
            User root
            IdentityFile ~/.ssh/id_ed25519_sirius_cloud
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Run cloud API integration smoke
        env:
          SIRIUS_CLOUD_SSH_HOST: sirius-cloud-root
          SIRIUS_CLOUD_REMOTE_ROOT: /root/sirius-xz-agent-it
          SIRIUS_CLOUD_TUNNEL_PORT: "15432"
          SIRIUS_CLOUD_REMOTE_PG_PORT: "5432"
        run: ./scripts/run-cloud-integration.sh
